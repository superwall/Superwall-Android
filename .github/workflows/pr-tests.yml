name: PR Tests

on:
  pull_request:
    branches: [ develop ]

jobs:
  unit-tests:
    runs-on: macos-15-intel

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref }}
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Change wrapper permissions
      run: chmod +x ./gradlew

    - name: Run unit tests with coverage
      run: ./gradlew :superwall:testDebugUnitTest -x lint -x lintDebug -x lintVitalRelease

    - name: Upload unit test coverage data
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: unit-test-coverage
        path: superwall/build/jacoco/

    - name: Upload unit test reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: unit-test-reports
        path: |
          superwall/build/reports/tests/
          superwall/build/test-results/

  instrumentation-tests:
    runs-on: macos-15-intel

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref }}
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Change wrapper permissions
      run: chmod +x ./gradlew

    - name: Run instrumentation tests with coverage
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 33
        target: google_apis
        arch: x86_64
        profile: pixel_7_pro
        force-avd-creation: true
        ram-size: 4096M
        emulator-boot-timeout: 1800
        disable-animations: true
        emulator-options: >
          -no-window
          -gpu swiftshader_indirect
          -no-boot-anim
          -noaudio
          -camera-back none
          -camera-front none
          -no-snapshot-save
        script: ./gradlew :superwall:connectedDebugAndroidTest -x lint -x lintDebug -x lintVitalRelease

    - name: Upload instrumentation test coverage data
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: instrumentation-test-coverage
        path: superwall/build/outputs/code_coverage/

    - name: Upload instrumentation test reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: instrumentation-test-reports
        path: |
          superwall/build/reports/androidTests/connected/
          superwall/build/outputs/androidTest-results/

  coverage-report:
    runs-on: macos-15-intel
    needs: [unit-tests, instrumentation-tests]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref }}
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Change wrapper permissions
      run: chmod +x ./gradlew

    - name: Download unit test coverage data
      uses: actions/download-artifact@v4
      with:
        name: unit-test-coverage
        path: superwall/build/jacoco/

    - name: Download instrumentation test coverage data
      uses: actions/download-artifact@v4
      with:
        name: instrumentation-test-coverage
        path: superwall/build/outputs/code_coverage/

    - name: Generate combined coverage report
      run: ./gradlew :superwall:compileDebugSources :superwall:jacocoTestReport -x testDebugUnitTest -x lint -x lintDebug -x lintVitalRelease

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: jacoco-coverage
        path: |
          superwall/build/reports/jacoco/

    - name: Generate JaCoCo Badge
      id: jacoco
      uses: cicirello/jacoco-badge-generator@v2
      with:
        jacoco-csv-file: superwall/build/reports/jacoco/jacocoTestReport/jacocoTestReport.csv
        badges-directory: .github/badges
        generate-branches-badge: true
        generate-coverage-badge: true

    - name: Commit coverage badge
      if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
      run: |
        cd ${{ github.workspace }}
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add .github/badges/
        if git diff --staged --quiet; then
          echo "No changes to badge"
        else
          git commit -m "Update coverage badge [skip ci]"
          git push origin HEAD:${{ github.head_ref }}
        fi
